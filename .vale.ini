# Türkçe Yazım Denetimi — Denomas
# https://github.com/Denomas/Turkce-yazim-denetimi

StylesPath = styles
MinAlertLevel = suggestion
Vocab = Turkish

# Türkçe markdown dosyaları (.tr.md uzantılı)
[*.tr.md]
BasedOnStyles = Turkish

# turkce/ klasöründeki tüm dosyalar
[turkce/*.md]
BasedOnStyles = Turkish

[turkce/*.txt]
BasedOnStyles = Turkish

# Tüm desteklenen dosya formatları
[*.md]
BasedOnStyles = Turkish

[*.rst]
BasedOnStyles = Turkish

[*.adoc]
BasedOnStyles = Turkish

[*.html]
BasedOnStyles = Turkish

[*.txt]
BasedOnStyles = Turkish

[*.org]
BasedOnStyles = Turkish
