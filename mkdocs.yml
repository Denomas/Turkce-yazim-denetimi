site_name: Türkçe Yazım Denetimi
site_url: https://denomas.github.io/Turkce-yazim-denetimi/
site_description: Türkçe yazım ve dilbilgisi denetimi — Denomas
site_author: Denomas

repo_url: https://github.com/Denomas/Turkce-yazim-denetimi
repo_name: Denomas/Turkce-yazim-denetimi
edit_uri: edit/main/belgeler/

docs_dir: belgeler

theme:
  name: material
  language: tr
  palette:
    - scheme: default
      primary: red
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Karanlık moda geç
    - scheme: slate
      primary: red
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Aydınlık moda geç
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - index.md
  - 🇹🇷 Türkçe:
    - tr/index.md
    - Başlangıç:
      - Kurulum: tr/baslangic/kurulum.md
      - İlk Adımlar: tr/baslangic/ilk-adimlar.md
      - VS Code: tr/baslangic/vs-code.md
    - Kullanım:
      - Pre-commit: tr/kullanim/pre-commit.md
      - GitHub Actions: tr/kullanim/github-actions.md
      - GitLab CI: tr/kullanim/gitlab-ci.md
      - Yapılandırma: tr/kullanim/yapilandirma.md
    - Kurallar: tr/kurallar/index.md
    - Katkıda Bulunma:
      - Geliştirici İş Akışı: tr/katki/gelistirici-is-akisi.md
      - Fork İş Akışı: tr/katki/fork-is-akisi.md
      - Geliştirme Ortamı: tr/katki/gelistirme-ortami.md
      - Yeni Kural Ekleme: tr/katki/yeni-kural-ekleme.md
    - Hakkında:
      - Felsefe: tr/hakkinda/felsefe.md
      - Mimari: tr/hakkinda/mimari.md
  - 🇬🇧 English:
    - en/index.md
    - Getting Started: en/getting-started.md
    - Usage: en/usage.md
    - Rules Reference: en/rules.md
    - Contributing: en/contributing.md
    - Developer Workflow: en/developer-workflow.md
    - Use Cases: en/use-cases.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: tr
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Denomas/Turkce-yazim-denetimi
