<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arka plan gradyanı -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fcfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f7fa;stop-opacity:1" />
    </linearGradient>
    
    <!-- Lale gradyanı -->
    <linearGradient id="tulipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c4b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#008b7d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Arka Plan -->
  <rect width="800" height="300" rx="15" ry="15" fill="url(#bgGradient)" />

  <!-- Sol Taraf: İkon (Lale + Checkmark) -->
  <g transform="translate(150, 50) scale(0.8)">
    <!-- Stilize Lale Formu -->
    <path d="M100,200 C40,200 20,120 20,80 C20,40 50,20 100,20 C150,20 180,40 180,80 C180,120 160,200 100,200 Z" fill="url(#tulipGradient)" opacity="0.15" />
    <path d="M100,190 C60,190 40,130 40,90 C40,60 70,40 100,40 C130,40 160,60 160,90 C160,130 140,190 100,190 Z" fill="url(#tulipGradient)" opacity="0.3" />
    
    <!-- Checkmark (Doğrulama İşareti) -->
    <path d="M60,100 L90,130 L150,60" stroke="#008b7d" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Kalem Ucu Alt Kısım -->
    <path d="M100,200 L100,230 L90,220 M100,230 L110,220" stroke="#2D3748" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>

  <!-- Sağ Taraf: Metin -->
  <g transform="translate(350, 110)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="bold" fill="#2D3748">Vale</text>
    <text x="0" y="60" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="300" fill="#008b7d">Turkish</text>
    
    <!-- Alt Başlık -->
    <text x="5" y="100" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#5a6b7c">Türkçe Stil ve Yazım Denetleyicisi</text>
  </g>
</svg>
