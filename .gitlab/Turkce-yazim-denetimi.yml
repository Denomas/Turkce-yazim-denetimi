# Türkçe Yazım Denetimi — GitLab CI Şablonu
# Denomas (https://denomas.com)
#
# Kullanım:
#   include:
#     - remote: 'https://raw.githubusercontent.com/Denomas/Turkce-yazim-denetimi/v1/.gitlab/Turkce-yazim-denetimi.yml'
#
#   Turkce-yazim-denetimi:
#     extends: .Turkce-yazim-denetimi
#     variables:
#       VALE_FILES: "docs/"
#       MIN_ALERT_LEVEL: "warning"
#
# Docker executor için image: alpine:latest kullanılır.
# Shell executor için sisteminizde wget/curl ve bash olmalıdır.

.Turkce-yazim-denetimi:
  variables:
    VALE_VERSION: "3.9.0"
    MIN_ALERT_LEVEL: "suggestion"
    VALE_FILES: "."
    VALE_TURKISH_VERSION: "v1.1.0"
    VALE_TURKISH_NO_SPELLING: "0"
  script:
    - |
      # Vale motorunu kur (sistem, Docker veya otomatik indirme)
      if command -v vale >/dev/null 2>&1; then
        echo "Vale zaten kurulu: $(vale --version)"
      elif command -v apk >/dev/null 2>&1; then
        # Alpine (Docker executor)
        apk add --no-cache wget bash tar
        wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        tar -xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        mv vale /usr/local/bin/
        rm -f "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
      else
        # Debian/Ubuntu/diğer Linux (shell executor)
        wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" || \
          curl -fsSL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -o "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        tar -xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
        mkdir -p "${HOME}/.local/bin"
        mv vale "${HOME}/.local/bin/"
        export PATH="${HOME}/.local/bin:${PATH}"
        rm -f "vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
      fi

      if ! command -v vale >/dev/null 2>&1; then
        echo "Hata: Vale kurulamadı."
        exit 1
      fi

      # Türkçe Yazım Denetimi stillerini indir
      wget -q "https://github.com/Denomas/Turkce-yazim-denetimi/archive/refs/tags/${VALE_TURKISH_VERSION}.tar.gz" -O Turkce-yazim-denetimi.tar.gz || \
        curl -fsSL "https://github.com/Denomas/Turkce-yazim-denetimi/archive/refs/tags/${VALE_TURKISH_VERSION}.tar.gz" -o Turkce-yazim-denetimi.tar.gz
      tar -xzf Turkce-yazim-denetimi.tar.gz
      STYLES_DIR="$(pwd)/$(ls -d Turkce-yazim-denetimi-*/styles)"

      # Spelling devre dışı bırakma
      SPELLING_LINE=""
      if [ "${VALE_TURKISH_NO_SPELLING}" = "1" ]; then
        SPELLING_LINE="Turkish.Spelling = NO"
      fi

      # Geçici config oluştur
      {
        echo "StylesPath = ${STYLES_DIR}"
        echo "MinAlertLevel = ${MIN_ALERT_LEVEL}"
        echo "Vocab = Turkish"
        echo ""
        echo "[*.md]"
        echo "BasedOnStyles = Turkish"
        [ -n "${SPELLING_LINE}" ] && echo "${SPELLING_LINE}"
        echo ""
        echo "[*.txt]"
        echo "BasedOnStyles = Turkish"
        [ -n "${SPELLING_LINE}" ] && echo "${SPELLING_LINE}"
      } > /tmp/Turkce-yazim-denetimi.ini

      # Vale motorunu JSON ile çalıştır ve raporları üret
      VALE_EXIT=0
      vale --config=/tmp/Turkce-yazim-denetimi.ini --output=JSON ${VALE_FILES} > /tmp/vale-results.json 2>/dev/null || VALE_EXIT=$?

      # Sonuçları göster (insan okunur)
      vale --config=/tmp/Turkce-yazim-denetimi.ini ${VALE_FILES} || true

      # JUnit XML raporu (GitLab Tests sekmesi)
      if command -v jq >/dev/null 2>&1 && [ -s /tmp/vale-results.json ]; then
        SCRIPT_DIR="$(pwd)/$(ls -d Turkce-yazim-denetimi-*/scripts)"
        if [ -f "${SCRIPT_DIR}/vale-to-junit.sh" ]; then
          bash "${SCRIPT_DIR}/vale-to-junit.sh" /tmp/vale-results.json > junit.xml 2>/dev/null || true
        fi
        if [ -f "${SCRIPT_DIR}/vale-to-codeclimate.sh" ]; then
          bash "${SCRIPT_DIR}/vale-to-codeclimate.sh" /tmp/vale-results.json > gl-code-quality-report.json 2>/dev/null || true
        fi
      fi

      exit $VALE_EXIT
  artifacts:
    when: always
    reports:
      junit: junit.xml
      codequality: gl-code-quality-report.json
    paths:
      - junit.xml
      - gl-code-quality-report.json
    expire_in: 30 days
